<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <div id="shell">
      <header class="topbar">
        <div class="brand">
          <div class="title">随访记录</div>
          <div id="summary" class="app-summary" hidden></div>
        </div>
        <div class="actions">
          <button id="openSheet" type="button">表格模式</button>
          <button id="saveSync" class="table-action" type="button" hidden>保存联动</button>
          <button id="refreshSync" type="button">从 SeaTable 刷新</button>
          <button id="expandAll" type="button">全部展开</button>
          <button id="collapseAll" type="button">全部收起</button>
          <button id="toggleClinicalGroup" type="button">临床</button>
          <button id="togglePathologyGroup" type="button">病理</button>
          <button id="toggleMolecularGroup" type="button">分子</button>
          <button id="toggleImagingGroup" type="button">影像</button>
          <button id="toggleDrugGroup" type="button">药敏</button>
          <button id="toggleFollowupGroup" type="button">随访</button>
          <button id="columnPanelToggle" class="table-action" type="button" hidden>列显示</button>
          <button id="toggleDrugs" class="table-action" type="button" hidden>收起药敏明细</button>
          <button id="reloadFull" class="table-action" type="button" hidden>重载完整数据</button>
          <span id="status" class="status">Univer Sheets</span>
        </div>
      </header>
      <section id="columnPanel" class="column-panel hidden" aria-label="列显示"></section>
      <main id="app"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
