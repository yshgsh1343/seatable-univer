<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <div id="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-main">
            <div class="title">随访记录</div>
            <select id="rawTableSwitch" class="raw-table-switch" aria-label="切换 SeaTable 表" hidden></select>
          </div>
          <div id="summary" class="app-summary" hidden></div>
        </div>
        <div class="actions">
          <button id="openSheet" type="button">表格模式</button>
          <button id="saveSync" class="table-action" type="button" hidden>保存联动</button>
          <button id="refreshSync" type="button">从 SeaTable 刷新</button>
          <button id="customGroupToggle" class="table-action" type="button" hidden>自定义分组</button>
          <button id="columnPanelToggle" class="table-action" type="button" hidden>列显示</button>
          <button id="reloadFull" class="table-action" type="button" hidden>重载完整数据</button>
          <span id="status" class="status">Univer Sheets</span>
        </div>
      </header>
      <section id="customGroupPanel" class="column-panel custom-group-panel hidden" aria-label="自定义分组"></section>
      <section id="columnPanel" class="column-panel hidden" aria-label="列显示"></section>
      <main id="app"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
